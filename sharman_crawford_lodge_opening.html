let speechEnabled = true;
let speakQueue = [];
let voiceA = null;
let voiceB = null;

function loadVoices() {
  if (!window.speechSynthesis) return;
  var voices = window.speechSynthesis.getVoices();
  var FEMALE = ['zira','victoria','samantha','karen','moira','tessa','fiona','veena','susan','serena','linda','kate','lisa','emma','alice','sarah','anna','claire','hazel','emily','allison','ava','joanna','salli','kimberly','kendra','ivy','aria','jenny','michelle','elizabeth','amy','natasha','catherine','melissa','female','woman','girl','lady'];
  var en = voices.filter(function(v){ return v.lang.startsWith('en'); });
  if (en.length === 0) en = voices;
  var male = en.filter(function(v){
    var n = v.name.toLowerCase();
    return !FEMALE.some(function(f){ return n.indexOf(f) !== -1; });
  });
  if (male.length === 0) male = en;
  voiceA = male[0] || null;
  voiceB = male.length > 1 ? male[1] : male[0];
  console.log('Voices loaded — A:', voiceA ? voiceA.name : 'none', '| B:', voiceB ? voiceB.name : 'none');
}

var LABEL_MAP = {

  'S.D.': 'Senior Deacon',

  'Junior Deacon': 'Junior Deacon',
  'Inner Guard': 'Inner Guard',
  'Director of Ceremonies': 'Director of Ceremonies',
  'Chaplain': 'Chaplain'
};

function expandLabel(t) {
  t = t.replace(/:$/, '').trim();
  return LABEL_MAP[t] || t;
}

function parseSegments(text) {
  var segments = [];
  var labelPattern = /([A-Z]\.[A-Z]\.|[A-Za-z][a-z]+(?: [A-Za-z][a-z]+)*|All Brethren respond|All|Tyler|Chaplain):\s*/g;
  var match;
  var lastIndex = 0;
  var parts = [];
  while ((match = labelPattern.exec(text)) !== null) {
    if (match.index > lastIndex) {
      parts.push({ type: 'text', content: text.substring(lastIndex, match.index) });
    }
    parts.push({ type: 'label', content: match[1] });
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) {
    parts.push({ type: 'text', content: text.substring(lastIndex) });
  }
  var i = 0;
  while (i < parts.length) {
    var p = parts[i];
    if (p.type === 'label') {
      segments.push({ text: expandLabel(p.content), voice: 'A' });
      if (i + 1 < parts.length && parts[i+1].type === 'text') {
        var spoken = parts[i+1].content.trim();
        if (spoken) segments.push({ text: spoken, voice: 'B' });
        i += 2;
      } else {
        i++;
      }
    } else {
      var plain = p.content.trim();
      if (plain) segments.push({ text: plain, voice: 'A' });
      i++;
    }
  }
  return segments;
}

function playBeep(onDone) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.35);
    osc.onended = function(){ ctx.close(); setTimeout(onDone, 80); };
  } catch(e) { setTimeout(onDone, 300); }
}

function processQueue() {
  if (speakQueue.length === 0) return;
  var item = speakQueue.shift();
  if (item.beep) {
    playBeep(function(){ setTimeout(processQueue, 60); });
    return;
  }
  if (!window.speechSynthesis) { speakQueue = []; return; }
  try {
    var u = new SpeechSynthesisUtterance(item.text);
    if (item.voice === 'B') {
      u.voice = voiceB;
      u.rate  = 0.78;
      u.pitch = 0.50;
    } else {
      u.voice = voiceA;
      u.rate  = 0.88;
      u.pitch = 0.85;
    }
    u.volume = 1.0;
    u.onend   = function(){ setTimeout(processQueue, 180); };
    u.onerror = function(){ setTimeout(processQueue, 180); };
    window.speechSynthesis.speak(u);
  } catch(e) { setTimeout(processQueue, 180); }
}

function speak(text) {
  if (!speechEnabled) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  speakQueue = [];
  if (!voiceA) loadVoices();
  var segs = parseSegments(text);
  if (segs.length === 0) segs = [{ text: text, voice: 'A' }];
  var expanded = [];
  segs.forEach(function(seg) {
    var parts = seg.text.split('[beep]');
    parts.forEach(function(p, i) {
      if (p.trim()) expanded.push({ text: p.trim(), voice: seg.voice });
      if (i < parts.length - 1) expanded.push({ beep: true });
    });
  });
  speakQueue = expanded.length > 0 ? expanded : segs;
  setTimeout(processQueue, 150);
}

function toggleSpeech() {
  speechEnabled = !speechEnabled;
  document.getElementById('speech-btn').textContent = speechEnabled ? 'Voice On' : 'Voice Off';
  if (!speechEnabled) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
    speakQueue = [];
  }
}

if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
  setTimeout(loadVoices, 500);
}

if (window.speechSynthesis) {

  {title:'Deacons collect the Word',desc:'The S.D. carries his wand and moves along the South side collecting the Word from each Brother. The J.D. moves along the North side from the Inner Guard position collecting the Word from each Brother on that side.',pos:{DC:{...FINAL.DC},WM:{...FINAL.WM},SD:{x:500,y:300},JD:{x:148,y:300},Chap:{...FINAL.Chap},SC:{...FINAL.SC},Alm:{...FINAL.Alm},Tres:{...FINAL.Tres},Sect:{...FINAL.Sect},SW:{...FINAL.SW},IG:{...FINAL.IG},Tyler:{...FINAL.Tyler}},hl:'SD'},

  {title:'W.M. questions the S.D.',desc:'W.M.: \"Brother Senior Deacon, where is your place in the Lodge?\" S.D.: \"At the back of the Chair of the Worshipful Master, or at his right hand if so permitted.\" W.M.: \"What is your duty there?\" S.D.: \"To carry all messages from the Worshipful Master to the Senior Warden, and to distribute the same throughout the Lodge if so directed, Worshipful Master.\"',pos:FPOS,hl:'SD'},

  {title:'DC declares the WM\'s place and duty',desc:'W.M.: \"Worshipful Brother D.C., where is the Master\'s place in the Lodge?\" D.C.: \"In the East, Worshipful Master.\" W.M.: \"What is his duty there?\" D.C.: \"As the sun rises in the East to open and illumine the glorious day, so the W.M. presides in the East to open the Lodge, to rule and govern it with good and wholesome advice and instruction.\" W.M.: \"It is so. I acknowledge my place and duty.\"',pos:FPOS,hl:'DC'},
  {title:'Wardens declare the Lodge open',desc:'W.M.: "Let the Wardens declare to the Brethren that it is my will and pleasure that the Lodge do now open." S.W. declares it. J.W. declares it. (The Wardens take sufficient time for the Deacons, D.C. and Chaplain to assemble at the Altar.)',pos:FPOS,hl:'SW'},
  {title:'Deacons, D.C. and Chaplain assemble at the Altar',desc:'While the Wardens make their announcements: The S.D. moves to the South side of the Altar (in S.A. he steps forward and turns left to pass East of the Altar). The J.D. passes behind the S.W. Chair along the North side to the North of the Altar. Both Deacons time themselves to arrive simultaneously, make smart inward turns and step close to the lesser lights. The D.C. leads the Chaplain to the West side of the Altar facing the W.M. in the East, with the D.C. to the North of the Chaplain. The W.M. waits until all are in position.',pos:{DC:{x:255,y:296},WM:{...FINAL.WM},SD:{x:350,y:244},Chap:{x:288,y:296},SC:{...FINAL.SC},Alm:{...FINAL.Alm},Tres:{...FINAL.Tres},Sect:{...FINAL.Sect},JW:{...FINAL.JW},SW:{...FINAL.SW},JD:{x:225,y:244},IG:{...FINAL.IG},Tyler:{...FINAL.Tyler}},hl:'DC'},

  {title:'Opening prayer',desc:'D.C.: "Brethren, adopt the Sign of Devotion for prayer." Chaplain: "May the favour of Heaven be upon this meeting; and as it is happily begun, may it be conducted with order, and closed with harmony." All: "So mote it be."',pos:{DC:{x:255,y:296},WM:{...FINAL.WM},SD:{x:350,y:244},Chap:{x:288,y:296},SC:{...FINAL.SC},Alm:{...FINAL.Alm},Tres:{...FINAL.Tres},Sect:{...FINAL.Sect},JW:{...FINAL.JW},SW:{...FINAL.SW},JD:{x:225,y:244},IG:{...FINAL.IG},Tyler:{...FINAL.Tyler}},hl:'Chap'},

let cur=0;
let pos={};
const pf=procFormation();
ALL.forEach(k=>{ pos[k] = pf[k] ? {...pf[k]} : {...FINAL[k]}; });
pos.Tyler = {x:40,y:448};

function lerp(a,b,t){return a+(b-a)*t;}

function drawFigure(key,p,hl,open){
  if(!p) return;
  const isPrincipal = IS_PRINCIPAL[key];
  const isHL = hl===key;
  const isOut = p.y > R.y+R.h+5;
  cx.globalAlpha = isOut ? 0.45 : 1;

  const headColor = isHL ? '#f0c040' : (isPrincipal ? '#4a9fd4' : '#c8a870');
  const bodyColor = isHL ? '#c8860a' : (isPrincipal ? '#1a5a8a' : '#5a4820');

  cx.beginPath(); cx.arc(p.x,p.y,8,0,Math.PI*2);
  cx.fillStyle=headColor; cx.fill();
  cx.strokeStyle=isHL?'#f0c040':'#3a2e18'; cx.lineWidth=1.5; cx.stroke();

  cx.strokeStyle=bodyColor; cx.lineWidth=2;
  cx.beginPath();
  cx.moveTo(p.x,p.y+8); cx.lineTo(p.x,p.y+24);
  cx.moveTo(p.x-9,p.y+14); cx.lineTo(p.x+9,p.y+14);
  cx.moveTo(p.x,p.y+24); cx.lineTo(p.x-7,p.y+37);
  cx.moveTo(p.x,p.y+24); cx.lineTo(p.x+7,p.y+37);
  cx.stroke();

  cx.fillStyle = isHL ? '#f0c040' : '#8a6820';
  cx.font = 'bold 8px Georgia';
  cx.textAlign = 'center';
  cx.fillText(LABELS[key], p.x, p.y+49);

  if(open && key==='WM'){
    cx.fillStyle='#f0c040';
    cx.font='bold 9px Georgia';
    cx.fillText('LODGE OPEN',p.x,p.y-14);
  }
  cx.globalAlpha=1;
}

function drawRoom(){
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#2a1f0e';
  cx.fillRect(R.x,R.y,R.w,R.h);
  cx.strokeStyle='#6a5020'; cx.lineWidth=2;
  cx.strokeRect(R.x,R.y,R.w,R.h);

  const sq=36;
  for(let r=0;r<Math.ceil(CHQ.h/sq);r++){
    for(let c=0;c<Math.ceil(CHQ.w/sq);c++){
      const fw=Math.min(sq,CHQ.w-c*sq), fh=Math.min(sq,CHQ.h-r*sq);
      if(fw>0&&fh>0){
        cx.fillStyle=(r+c)%2===0?'#1a1410':'#d4c8a0';
        cx.fillRect(CHQ.x+c*sq,CHQ.y+r*sq,fw,fh);
      }
    }
  }
  cx.strokeStyle='#5a4820'; cx.lineWidth=0.5;
  cx.strokeRect(CHQ.x,CHQ.y,CHQ.w,CHQ.h);

  cx.fillStyle='#3a2e18'; cx.strokeStyle='#5a4820'; cx.lineWidth=0.5;
  cx.fillRect(R.x+2,CHQ.y,CHQ.x-R.x-2,CHQ.h); cx.strokeRect(R.x+2,CHQ.y,CHQ.x-R.x-2,CHQ.h);
  cx.fillRect(CHQ.x+CHQ.w,CHQ.y,R.x+R.w-CHQ.x-CHQ.w-2,Math.round(CHQ.h*0.46));
  cx.strokeRect(CHQ.x+CHQ.w,CHQ.y,R.x+R.w-CHQ.x-CHQ.w-2,Math.round(CHQ.h*0.46));
  cx.fillRect(CHQ.x+CHQ.w,CHQ.y+Math.round(CHQ.h*0.54),R.x+R.w-CHQ.x-CHQ.w-2,Math.round(CHQ.h*0.46));
  cx.strokeRect(CHQ.x+CHQ.w,CHQ.y+Math.round(CHQ.h*0.54),R.x+R.w-CHQ.x-CHQ.w-2,Math.round(CHQ.h*0.46));

  cx.fillStyle='#c4a030'; cx.font='8px Georgia'; cx.textAlign='center';
  cx.fillText('N benches',R.x+CHQ.x/2-R.x/2+2,CHQ.y+CHQ.h/2);
  cx.save(); cx.translate(CHQ.x+CHQ.w+(R.x+R.w-CHQ.x-CHQ.w)/2,CHQ.y+CHQ.h*0.23); cx.fillText('S benches',0,0); cx.restore();
  cx.save(); cx.translate(CHQ.x+CHQ.w+(R.x+R.w-CHQ.x-CHQ.w)/2,CHQ.y+CHQ.h*0.77); cx.fillText('S benches',0,0); cx.restore();

  cx.fillStyle='#f5e0a0'; cx.strokeStyle='#c4a030'; cx.lineWidth=2;
  cx.fillRect(ALT.x,ALT.y,ALT.w,ALT.h); cx.strokeRect(ALT.x,ALT.y,ALT.w,ALT.h);
  cx.fillStyle='#4a2e08'; cx.font='bold 10px Georgia'; cx.textAlign='center';
  cx.fillText('ALTAR',ALT.x+ALT.w/2,ALT.y+16);
  cx.fillStyle='#d4c080'; cx.strokeStyle='#8a6820'; cx.lineWidth=1;
  cx.fillRect(ALT.x+16,ALT.y+24,44,14); cx.strokeRect(ALT.x+16,ALT.y+24,44,14);
  cx.beginPath(); cx.moveTo(ALT.x+38,ALT.y+24); cx.lineTo(ALT.x+38,ALT.y+38); cx.stroke();
  cx.beginPath(); cx.moveTo(ALT.x+16,ALT.y+30); cx.lineTo(ALT.x+60,ALT.y+30); cx.stroke();
  cx.beginPath(); cx.moveTo(ALT.x+16,ALT.y+35); cx.lineTo(ALT.x+60,ALT.y+35); cx.stroke();

  [[ALT.x-18,CHQ_CY-14,'W'],[ALT.x-18,CHQ_CY+14,'S'],[ALT.x+ALT.w+18,CHQ_CY,'B']].forEach(([bx,by,l])=>{
    cx.beginPath(); cx.arc(bx,by,7,0,Math.PI*2);
    cx.fillStyle='#f0c040'; cx.fill(); cx.strokeStyle='#a07828'; cx.lineWidth=1.5; cx.stroke();
    cx.fillStyle='#4a2e08'; cx.font='bold 8px Georgia'; cx.textAlign='center';
    cx.fillText(l,bx,by+3);
  });

  cx.fillStyle='#f0f0d8'; cx.strokeStyle='#6a5020'; cx.lineWidth=2;
  cx.fillRect(270,446,44,18); cx.strokeRect(270,446,44,18);
  cx.fillRect(314,446,44,18); cx.strokeRect(314,446,44,18);
  cx.fillStyle='#8a7040'; cx.font='10px Georgia'; cx.textAlign='center';
  cx.fillText('L',292,458); cx.fillText('R',336,458);
  cx.beginPath(); cx.arc(270,463,13,Math.PI,0); cx.strokeStyle='#5a4820'; cx.lineWidth=1; cx.stroke();
  cx.beginPath(); cx.arc(358,463,13,Math.PI,0); cx.strokeStyle='#5a4820'; cx.lineWidth=1; cx.stroke();

  cx.fillStyle='#8a6820'; cx.font='10px Georgia'; cx.textAlign='center';
  cx.fillText('EAST', W/2, 12);
  cx.fillText('WEST / entrance', W/2, 498);
  cx.save(); cx.translate(44,260); cx.rotate(-Math.PI/2); cx.fillText('NORTH',0,0); cx.restore();
  cx.save(); cx.translate(W-30,260); cx.rotate(Math.PI/2); cx.fillText('SOUTH',0,0); cx.restore();

  cx.fillStyle='#5a4820'; cx.font='9px Georgia'; cx.textAlign='left';
  cx.fillText('Tyler outside',370,455);
}

function buildPips(){
  const d=document.getElementById('progress');
  d.innerHTML='';
  STEPS.forEach((_,i)=>{
    const p=document.createElement('div');
    p.className='pip'+(i<cur?' done':(i===cur?' active':''));
    p.onclick=()=>{ cur=i; animTo(cur); };
    d.appendChild(p);
  });
}

function render(){
  drawRoom();
  const s=STEPS[cur];
  ALL.forEach(k=>{ if(pos[k]) drawFigure(k,pos[k],s.hl,s.open); });
  document.getElementById('step-title').textContent=s.title+' — Step '+(cur+1)+' of '+STEPS.length;
  if(SPEECH[cur]) speak(SPEECH[cur]);
  document.getElementById('info-box').textContent=s.desc;
  document.getElementById('step-lbl').textContent=(cur+1)+' / '+STEPS.length;
  buildPips();
}

function animTo(step){
  const target=STEPS[step].pos;
  const start={};
  ALL.forEach(k=>{ start[k]={...pos[k]}; });
  let t=0; const dur=55;
  const tick=setInterval(()=>{
    t++;
    const e=1-Math.pow(1-Math.min(t/dur,1),3);
    ALL.forEach(k=>{
      if(target[k]) pos[k]={x:lerp(start[k].x,target[k].x,e),y:lerp(start[k].y,target[k].y,e)};
    });
    render();
    if(t>=dur) clearInterval(tick);
  },18);
}

function next(){ if(cur<STEPS.length-1){ cur++; animTo(cur); } }
function prev(){ if(cur>0){ cur--; animTo(cur); } }




document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') next();
  else if(e.key==='ArrowLeft') prev();
});

render();
</script>
