function lerp(a,b,t){return a+(b-a)*t;}

function loadVoices(){
  if(!window.speechSynthesis) return;
  var voices=window.speechSynthesis.getVoices();
  var FEMALE=['zira','victoria','samantha','karen','moira','tessa','fiona','veena','susan','serena','linda','kate','lisa','emma','alice','sarah','anna','claire','hazel','emily','allison','ava','joanna','salli','kimberly','kendra','ivy','aria','jenny','michelle','elizabeth','amy','natasha','catherine','melissa','female','woman','girl','lady'];
  var en=voices.filter(function(v){return v.lang.startsWith('en');});
  if(en.length===0) en=voices;
  var male=en.filter(function(v){
    var n=v.name.toLowerCase();
    return !FEMALE.some(function(f){return n.indexOf(f)!==-1;});
  });
  if(male.length===0) male=en;
  voiceA=male[0]||null;
  voiceB=male.length>1?male[1]:male[0];
  console.log('voiceA:',voiceA?voiceA.name:'none','voiceB:',voiceB?voiceB.name:'none');
}

var LABEL_MAP={'W.M.':'Worshipful Master','S.W.':'Senior Warden','J.W.':'Junior Warden','S.D.':'Senior Deacon','J.D.':'Junior Deacon','I.G.':'Inner Guard','D.C.':'Director of Ceremonies','Chap.':'Chaplain','Tyler':'Tyler','All:':'All Brethren respond','All Brethren respond:':'All Brethren respond'};
function expandLabel(t){t=t.replace(/:$/,'').trim(); return LABEL_MAP[t]||t;}
function parseSegments(text){
  var segments=[];
  var labelPattern=/([A-Z]\.[A-Z]\.|[A-Za-z][a-z]+(?: [A-Za-z][a-z]+)*|All Brethren respond|All|Tyler|Chaplain):\s*/g;
  var match, lastIndex=0, parts=[];
  while((match=labelPattern.exec(text))!==null){
    if(match.index>lastIndex) parts.push({type:'text',content:text.substring(lastIndex,match.index)});
    parts.push({type:'label',content:match[1]});
    lastIndex=match.index+match[0].length;
  }
  if(lastIndex<text.length) parts.push({type:'text',content:text.substring(lastIndex)});
  var i=0;
  while(i<parts.length){
    var p=parts[i];
    if(p.type==='label'){
      segments.push({text:expandLabel(p.content),voice:'A'});
      if(i+1<parts.length&&parts[i+1].type==='text'){
        var spoken=parts[i+1].content.trim();
        if(spoken) segments.push({text:spoken,voice:'B'});
        i+=2;
      } else i++;
    } else {
      var plain=p.content.trim();
      if(plain) segments.push({text:plain,voice:'A'});
      i++;
    }
  }
  return segments;
}

function playBeep(onDone){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator(); var gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine'; osc.frequency.value=880;
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.35);
    osc.onended=function(){ctx.close(); setTimeout(onDone,80);};
  } catch(e){setTimeout(onDone,300);}
}

function processQueue(){
  if(speakQueue.length===0) return;
  var item=speakQueue.shift();
  if(item.beep){playBeep(function(){setTimeout(processQueue,60);}); return;}
  if(!window.speechSynthesis){speakQueue=[];return;}
  try{
    var u=new SpeechSynthesisUtterance(item.text);
    if(item.voice==='B'){u.voice=voiceB;u.rate=0.78;u.pitch=0.50;}
    else{u.voice=voiceA;u.rate=0.88;u.pitch=0.85;}
    u.volume=1.0;
    u.onend=function(){setTimeout(processQueue,180);};
    u.onerror=function(){setTimeout(processQueue,180);};
    window.speechSynthesis.speak(u);
  } catch(e){setTimeout(processQueue,180);}
}

function speak(text){
  if(!speechEnabled) return;
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  speakQueue=[];
  if(!voiceA) loadVoices();
  var segs=parseSegments(text);
  if(segs.length===0) segs=[{text:text,voice:'A'}];
  var expanded=[];
  segs.forEach(function(seg){
    var parts=seg.text.split('[beep]');
    parts.forEach(function(p,i){
      if(p.trim()) expanded.push({text:p.trim(),voice:seg.voice});
      if(i<parts.length-1) expanded.push({beep:true});
    });
  });
  speakQueue=expanded.length>0?expanded:segs;
  setTimeout(processQueue,150);
}

function toggleSpeech(){
  speechEnabled=!speechEnabled;
  document.getElementById('speech-btn').textContent=speechEnabled?'Voice On':'Voice Off';
  if(!speechEnabled){try{window.speechSynthesis.cancel();}catch(e){} speakQueue=[];}
}

if(window.speechSynthesis){
  window.speechSynthesis.addEventListener('voiceschanged',loadVoices);
  setTimeout(loadVoices,500);
}

function drawFigure(key,p,hl){
  if(!p) return;
  var isPrincipal=IS_PRINCIPAL[key];
  var isTyler=key==='Tyler';
  var isHL=hl===key;
  var isOut=p.y>R.y+R.h+5;
  cx.globalAlpha=isOut?0.5:1;

  if(isTyler){
    cx.setLineDash([4,3]);
    cx.strokeStyle=isHL?'#f0c040':'#8a7040'; cx.lineWidth=1.5;
    cx.strokeRect(p.x-28,p.y-10,60,26);
    cx.setLineDash([]);
    cx.fillStyle=isHL?'#f0c040':'#c8a040'; cx.font='bold 10px Georgia'; cx.textAlign='center';
    cx.fillText('Tyler',p.x+2,p.y+3);
    cx.fillStyle='#6a5020'; cx.font='9px Georgia';
    cx.fillText('outside',p.x+2,p.y+14);
    cx.globalAlpha=1; return;
  }

  var headColor=isHL?'#f0c040':(isPrincipal?'#4a9fd4':'#c8a870');
  var bodyColor=isHL?'#c8860a':(isPrincipal?'#1a5a8a':'#5a4820');
  cx.beginPath(); cx.arc(p.x,p.y,8,0,Math.PI*2);
  cx.fillStyle=headColor; cx.fill();
  cx.strokeStyle=isHL?'#f0c040':'#2a1a08'; cx.lineWidth=1.5; cx.stroke();
  cx.strokeStyle=bodyColor; cx.lineWidth=2;
  cx.beginPath();
  cx.moveTo(p.x,p.y+8); cx.lineTo(p.x,p.y+24);
  cx.moveTo(p.x-9,p.y+14); cx.lineTo(p.x+9,p.y+14);
  cx.moveTo(p.x,p.y+24); cx.lineTo(p.x-7,p.y+37);
  cx.moveTo(p.x,p.y+24); cx.lineTo(p.x+7,p.y+37);
  cx.stroke();
  cx.fillStyle=isHL?'#185FA5':'#333'; cx.font='9px Georgia'; cx.textAlign='center';
  cx.fillText(LABELS[key],p.x,p.y+50);
  cx.globalAlpha=1;
}

function drawRoom(){
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#2a1f0e'; cx.fillRect(R.x,R.y,R.w,R.h);
  cx.strokeStyle='#6a5020'; cx.lineWidth=2; cx.strokeRect(R.x,R.y,R.w,R.h);
  var sq=36;
  for(var r=0;r<Math.ceil(CHQ.h/sq);r++){
    for(var c=0;c<Math.ceil(CHQ.w/sq);c++){
      var fw=Math.min(sq,CHQ.w-c*sq),fh=Math.min(sq,CHQ.h-r*sq);
      if(fw>0&&fh>0){cx.fillStyle=(r+c)%2===0?'#1a1410':'#d4c8a0'; cx.fillRect(CHQ.x+c*sq,CHQ.y+r*sq,fw,fh);}
    }
  }
  cx.strokeStyle='#5a4820'; cx.lineWidth=0.5; cx.strokeRect(CHQ.x,CHQ.y,CHQ.w,CHQ.h);
  cx.fillStyle='#3a2e18'; cx.strokeStyle='#5a4820'; cx.lineWidth=0.5;
  cx.fillRect(R.x+2,CHQ.y,CHQ.x-R.x-2,CHQ.h); cx.strokeRect(R.x+2,CHQ.y,CHQ.x-R.x-2,CHQ.h);
  cx.fillRect(CHQ.x+CHQ.w,CHQ.y,R.x+R.w-CHQ.x-CHQ.w-2,CHQ.h*0.44); cx.strokeRect(CHQ.x+CHQ.w,CHQ.y,R.x+R.w-CHQ.x-CHQ.w-2,CHQ.h*0.44);
  cx.fillRect(CHQ.x+CHQ.w,CHQ.y+CHQ.h*0.56,R.x+R.w-CHQ.x-CHQ.w-2,CHQ.h*0.44); cx.strokeRect(CHQ.x+CHQ.w,CHQ.y+CHQ.h*0.56,R.x+R.w-CHQ.x-CHQ.w-2,CHQ.h*0.44);
  cx.fillStyle='#c4a030'; cx.font='9px Georgia'; cx.textAlign='center';
  cx.fillText('North benches',R.x+2+(CHQ.x-R.x-2)/2,CHQ.y+CHQ.h/2);
  cx.fillText('S. benches',CHQ.x+CHQ.w+(R.x+R.w-CHQ.x-CHQ.w-2)/2,CHQ.y+CHQ.h*0.22);
  cx.fillText('S. benches',CHQ.x+CHQ.w+(R.x+R.w-CHQ.x-CHQ.w-2)/2,CHQ.y+CHQ.h*0.78);
  cx.fillStyle='#f5e0a0'; cx.strokeStyle='#c4a030'; cx.lineWidth=2;
  cx.fillRect(ALT.x,ALT.y,ALT.w,ALT.h); cx.strokeRect(ALT.x,ALT.y,ALT.w,ALT.h);
  cx.fillStyle='#4a2e08'; cx.font='bold 10px Georgia'; cx.textAlign='center';
  cx.fillText('ALTAR',ALT.x+ALT.w/2,ALT.y+15);
  cx.fillStyle='#d4c080'; cx.strokeStyle='#8a6820'; cx.lineWidth=1;
  cx.fillRect(ALT.x+16,ALT.y+23,48,16); cx.strokeRect(ALT.x+16,ALT.y+23,48,16);
  cx.beginPath(); cx.moveTo(ALT.x+40,ALT.y+23); cx.lineTo(ALT.x+40,ALT.y+39); cx.stroke();
  cx.beginPath(); cx.moveTo(ALT.x+16,ALT.y+29); cx.lineTo(ALT.x+64,ALT.y+29); cx.stroke();
  cx.beginPath(); cx.moveTo(ALT.x+16,ALT.y+34); cx.lineTo(ALT.x+64,ALT.y+34); cx.stroke();
  [[ALT.x-18,CHQ_CY-14,'W'],[ALT.x-18,CHQ_CY+14,'S'],[ALT.x+ALT.w+18,CHQ_CY,'B']].forEach(function(a){
    cx.beginPath(); cx.arc(a[0],a[1],7,0,Math.PI*2);
    cx.fillStyle='#f0c040'; cx.fill(); cx.strokeStyle='#a07828'; cx.lineWidth=1.5; cx.stroke();
    cx.fillStyle='#4a2e08'; cx.font='bold 8px Georgia'; cx.textAlign='center'; cx.fillText(a[2],a[0],a[1]+3);
  });
  cx.fillStyle='#f0f0d8'; cx.strokeStyle='#6a5020'; cx.lineWidth=2;
  cx.fillRect(270,446,44,18); cx.strokeRect(270,446,44,18);
  cx.fillRect(314,446,44,18); cx.strokeRect(314,446,44,18);
  cx.strokeStyle='#6a5020'; cx.lineWidth=1.5;
  cx.beginPath(); cx.arc(270,463,13,Math.PI,0); cx.stroke();
  cx.beginPath(); cx.arc(358,463,13,Math.PI,0); cx.stroke();
  cx.fillStyle='#8a7040'; cx.font='10px Georgia'; cx.textAlign='center';
  cx.fillText('L',292,458); cx.fillText('R',336,458);
  cx.fillStyle='#8a6820'; cx.font='10px Georgia'; cx.textAlign='center';
  cx.fillText('EAST',W/2,12); cx.fillText('WEST / entrance',W/2,498);
  cx.save(); cx.translate(44,H/2); cx.rotate(-Math.PI/2); cx.fillText('NORTH',0,0); cx.restore();
  cx.save(); cx.translate(W-28,H/2); cx.rotate(Math.PI/2); cx.fillText('SOUTH',0,0); cx.restore();
  cx.fillStyle='#6a5020'; cx.font='9px Georgia'; cx.textAlign='left';
  cx.fillText('Tyler outside',390,455);
}

function buildPips(){
  var d=document.getElementById('progress'); d.innerHTML='';
  STEPS.forEach(function(_,i){
    var p=document.createElement('div');
    p.className='pip'+(i<cur?' done':(i===cur?' active':''));
    p.onclick=function(){cur=i;animTo(cur);};
    d.appendChild(p);
  });
}

function render(){
  drawRoom();
  var s=STEPS[cur];
  ALL.forEach(function(k){if(pos[k]) drawFigure(k,pos[k],s.hl);});
  document.getElementById('step-title').textContent=s.title+' — Step '+(cur+1)+' of '+STEPS.length;
  var infoBox = document.getElementById('info-box');
  if (cur === STEPS.length-2 || cur === STEPS.length-1) {
    infoBox.innerHTML = s.desc.replace(
      'When Irish Eyes Are Smiling',
      '<a href="https://www.irish-song-lyrics.com/When_Irish_Eyes_Smiling.shtml" target="_blank" style="color:#f0c040;">When Irish Eyes Are Smiling (lyrics)</a>'
    );
  } else {
    infoBox.textContent = s.desc;
  }
  document.getElementById('step-lbl').textContent=(cur+1)+' / '+STEPS.length;
  buildPips();
}

function animTo(step){
  var target=STEPS[step].pos;
  var start={};
  ALL.forEach(function(k){start[k]={...pos[k]};});
  var t=0; var dur=55;
  var tick=setInterval(function(){
    t++; var e=1-Math.pow(1-Math.min(t/dur,1),3);
    ALL.forEach(function(k){
      if(target[k]) pos[k]={x:lerp(start[k].x,target[k].x,e),y:lerp(start[k].y,target[k].y,e)};
    });
    render();
    if(t>=dur){clearInterval(tick); if(SPEECH[cur]) speak(SPEECH[cur]);}
  },18);
}

function next(){if(cur<STEPS.length-1){cur++;animTo(cur);}}
function prev(){if(cur>0){cur--;animTo(cur);}}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight') next();
  else if(e.key==='ArrowLeft') prev();
});

render();
</script>
